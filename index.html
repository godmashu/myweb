<!DOCTYPE html>
<html>
<head>
    <title>Assignment_04</title>
    <meta name="viewport" content="user-scalable=no,initial-
    scale=1,maximum-scale=1">
    <style>
        @font-face {
            font-family: 'Isamanru';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_20-10@1.0/GongGothicLight.woff') format('woff');
        }
       
        .font_f {font-family: 'Isamanru';}
        .font_r { text-align: right; }

        @media screen and (max-width: 767px) {
            body { background-color: white;}

        }
        
        @media screen and (min-width: 768px) and (max-width: 959px) {
            body { background-color: white;}

        }

<body>
    <h1 class = "font_f font_c">사랑은 아픔</h1>
    <p class = "font_r">용혜원</p>
    <br></br>

    <p class = "font_f font_c">서로 사랑하는 사람들이</p>
    <p class = "font_f font_c">만나지 못할 때</p>
    <br></br>

    <p class = "font_f font_c">서로 아끼는 사람들이</p>
    <p class = "font_f font_c">사랑할 수 없을 때</p>
    <br></br>

    <p class = "font_f font_c">서로 좋아하는 사람들이</p>
    <p class = "font_f font_c">함께 잠들지 못할 때</p>

    <p class = "font_f font_c">사랑은 아픔이 된다</p>
